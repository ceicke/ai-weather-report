name: Deploy to Server

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Deploy via rsync over SSH
        uses: burnett01/rsync-deployments@7.0.1
        with:
          switches: -avzr --delete --exclude='.git' --exclude='.github' --exclude='vendor/' --exclude='.env' --exclude='output_images/'
          path: ./
          remote_path: /home/ceicke/ai-weather-report/
          remote_host: geisterstunde.org
          remote_user: ceicke
          remote_key: ${{ secrets.SSH_KEY }}

      - name: Run weather script on server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: geisterstunde.org
          username: ceicke
          key: ${{ secrets.SSH_KEY }}
          script: |
            source /usr/share/rvm/scripts/rvm
            cd /home/ceicke/ai-weather-report
            rvm use 3.4.0
            export BUNDLE_PATH="vendor/bundle"
            export BUNDLE_DEPLOYMENT="false"
            bundle install
            bundle exec ruby weather.rb